<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>演出详情 - 看了没</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' },
            dark: { 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .text-gradient { background: linear-gradient(to right, #38bdf8, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .gradient-primary { background: linear-gradient(to right, #0284c7, #0ea5e9); }
  </style>
</head>
<body class="bg-dark-950 text-dark-100 min-h-screen">
  <!-- 导航栏 -->
  <header class="sticky top-0 z-50 bg-dark-900/95 backdrop-blur border-b border-dark-800">
    <nav class="container mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg gradient-primary flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <span class="text-xl font-bold text-gradient">看了没</span>
      </a>
    </nav>
  </header>

  <main class="container mx-auto px-4 py-8">
    <a href="/events/" class="inline-flex items-center gap-1 text-dark-400 hover:text-white mb-6 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      返回列表
    </a>

    <!-- 加载状态 -->
    <div id="loading" class="animate-pulse">
      <div class="h-80 bg-dark-800 rounded-xl mb-6"></div>
      <div class="h-6 bg-dark-800 rounded w-2/3 mb-4"></div>
      <div class="h-4 bg-dark-800 rounded w-1/2"></div>
    </div>

    <!-- 详情内容 -->
    <div id="detail" class="hidden">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- 海报 -->
        <div class="lg:col-span-1">
          <div class="sticky top-24">
            <div id="poster" class="bg-dark-900 rounded-xl overflow-hidden"></div>
          </div>
        </div>
        <!-- 信息 -->
        <div class="lg:col-span-2 space-y-6">
          <div>
            <div id="typeBadge" class="mb-2"></div>
            <h1 id="title" class="text-2xl md:text-3xl font-bold text-white mb-2"></h1>
            <div id="artists" class="flex flex-wrap gap-2 mt-3"></div>
          </div>
          <div class="bg-dark-900 rounded-xl p-6 space-y-4">
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-lg bg-dark-800 flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              </div>
              <div>
                <p class="text-dark-400 text-sm">演出时间</p>
                <p id="eventDate" class="text-white font-medium"></p>
              </div>
            </div>
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-lg bg-dark-800 flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
              </div>
              <div>
                <p class="text-dark-400 text-sm">演出场馆</p>
                <p id="venue" class="text-white font-medium"></p>
                <p id="city" class="text-dark-500 text-sm"></p>
              </div>
            </div>
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-lg bg-dark-800 flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
              </div>
              <div>
                <p class="text-dark-400 text-sm">票价</p>
                <p id="price" class="text-primary-400 font-medium text-lg"></p>
              </div>
            </div>
          </div>
          <div id="description" class="hidden">
            <h3 class="text-lg font-medium mb-3">演出介绍</h3>
            <div class="bg-dark-900 rounded-xl p-6">
              <p id="descText" class="text-dark-300 leading-relaxed whitespace-pre-line"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 错误状态 -->
    <div id="error" class="py-20 text-center hidden">
      <svg class="w-16 h-16 mx-auto text-dark-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
      <p class="text-dark-400">演出信息不存在或已下架</p>
      <a href="/events/" class="mt-4 inline-block px-4 py-2 bg-primary-600 text-white rounded-lg">返回列表</a>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://fjdjumlzqazvulvanmdg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqZGp1bWx6cWF6dnVsdmFubWRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODkxNjMsImV4cCI6MjA4ODg2NTE2M30.TWY_ftq6GYHU95zFb2JoIJZ0O_JCCwPt9AE_69DgCmI';

    const typeLabels = { concert: '演唱会', livehouse: 'Livehouse', festival: '音乐节' };
    const typeColors = { concert: 'bg-pink-500/80', livehouse: 'bg-purple-500/80', festival: 'bg-orange-500/80' };

    async function loadEventDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      
      if (!id) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${id}&select=*`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        
        const events = await response.json();
        const event = events[0];

        if (!event) throw new Error('Not found');

        // 填充数据
        document.getElementById('poster').innerHTML = event.poster_url 
          ? `<img src="${event.poster_url}" alt="${event.title}" class="w-full aspect-[3/4] object-cover">`
          : `<div class="w-full aspect-[3/4] bg-gradient-to-br from-dark-700 to-dark-800 flex items-center justify-center"><svg class="w-20 h-20 text-dark-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>`;

        document.getElementById('typeBadge').innerHTML = `<span class="px-2 py-1 rounded text-xs font-medium ${typeColors[event.event_type] || 'bg-dark-700'} text-white">${typeLabels[event.event_type] || '演出'}</span>`;
        document.getElementById('title').textContent = event.title;
        document.getElementById('artists').innerHTML = (event.artist_names || []).map(a => `<span class="px-3 py-1 bg-dark-800 rounded-full text-sm text-dark-300">${a}</span>`).join('');

        const date = new Date(event.event_date);
        document.getElementById('eventDate').textContent = date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long', hour: '2-digit', minute: '2-digit' });
        document.getElementById('venue').textContent = event.venue_name || '待定';
        document.getElementById('city').textContent = event.city;
        document.getElementById('price').textContent = event.price_range || '待定';

        if (event.description) {
          document.getElementById('description').classList.remove('hidden');
          document.getElementById('descText').textContent = event.description;
        }

        document.title = `${event.title} - 看了没`;
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('detail').classList.remove('hidden');

      } catch (err) {
        console.error(err);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
      }
    }

    document.addEventListener('DOMContentLoaded', loadEventDetail);
  </script>
</body>
</html>
