<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>看了没 - 发现你喜欢的演出</title>
  <meta name="description" content="聚合全国音乐演出信息，一站式发现演唱会、Livehouse、音乐节">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' },
            dark: { 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .text-gradient { background: linear-gradient(to right, #38bdf8, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .gradient-primary { background: linear-gradient(to right, #0284c7, #0ea5e9); }
  </style>
</head>
<body class="bg-dark-950 text-dark-100 min-h-screen">
  <!-- 导航栏 -->
  <header class="sticky top-0 z-50 bg-dark-900/95 backdrop-blur border-b border-dark-800">
    <nav class="container mx-auto px-4 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg gradient-primary flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <span class="text-xl font-bold text-gradient">看了没</span>
      </a>
      <div class="flex items-center gap-4">
        <a href="/events/" class="text-dark-300 hover:text-white transition-colors">全部演出</a>
        <span class="text-dark-400 text-sm">广州</span>
      </div>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="relative py-16 md:py-24 overflow-hidden">
    <div class="absolute inset-0 gradient-primary opacity-10"></div>
    <div class="container mx-auto px-4 relative">
      <div class="max-w-2xl">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">
          发现你喜欢的<span class="text-gradient">演出</span>
        </h1>
        <p class="text-dark-400 text-lg mb-8">
          聚合全国音乐演出信息，一站式发现演唱会、Livehouse、音乐节
        </p>
        <a href="/events/" class="inline-flex items-center gap-2 px-6 py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-500 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
          浏览演出
        </a>
      </div>
    </div>
  </section>

  <!-- 热门城市 -->
  <section class="py-8 border-b border-dark-800">
    <div class="container mx-auto px-4">
      <div class="flex items-center gap-3 overflow-x-auto pb-2">
        <span class="text-dark-400 text-sm whitespace-nowrap">热门城市:</span>
        <div id="cityList" class="flex gap-2">
          <button class="city-btn px-3 py-1 rounded-full text-sm whitespace-nowrap bg-dark-800 text-dark-300 hover:bg-dark-700 transition-all" data-city="">全部</button>
          <button class="city-btn px-3 py-1 rounded-full text-sm whitespace-nowrap bg-primary-600 text-white" data-city="广州">广州</button>
          <button class="city-btn px-3 py-1 rounded-full text-sm whitespace-nowrap bg-dark-800 text-dark-300 hover:bg-dark-700 transition-all" data-city="北京">北京</button>
          <button class="city-btn px-3 py-1 rounded-full text-sm whitespace-nowrap bg-dark-800 text-dark-300 hover:bg-dark-700 transition-all" data-city="上海">上海</button>
          <button class="city-btn px-3 py-1 rounded-full text-sm whitespace-nowrap bg-dark-800 text-dark-300 hover:bg-dark-700 transition-all" data-city="深圳">深圳</button>
          <button class="city-btn px-3 py-1 rounded-full text-sm whitespace-nowrap bg-dark-800 text-dark-300 hover:bg-dark-700 transition-all" data-city="成都">成都</button>
          <button class="city-btn px-3 py-1 rounded-full text-sm whitespace-nowrap bg-dark-800 text-dark-300 hover:bg-dark-700 transition-all" data-city="杭州">杭州</button>
          <button class="city-btn px-3 py-1 rounded-full text-sm whitespace-nowrap bg-dark-800 text-dark-300 hover:bg-dark-700 transition-all" data-city="香港">香港</button>
          <button class="city-btn px-3 py-1 rounded-full text-sm whitespace-nowrap bg-dark-800 text-dark-300 hover:bg-dark-700 transition-all" data-city="澳门">澳门</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 本周热门 -->
  <section class="py-12">
    <div class="container mx-auto px-4">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold">本周热门</h2>
        <a href="/events/" class="text-primary-400 hover:text-primary-300 text-sm flex items-center gap-1">
          查看全部
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </a>
      </div>
      
      <!-- 加载状态 -->
      <div id="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="bg-dark-900 rounded-xl overflow-hidden"><div class="aspect-[3/4] bg-dark-800 animate-pulse"></div><div class="p-4 space-y-2"><div class="h-4 bg-dark-800 rounded animate-pulse"></div><div class="h-3 bg-dark-800 rounded w-2/3 animate-pulse"></div></div></div>
        <div class="bg-dark-900 rounded-xl overflow-hidden"><div class="aspect-[3/4] bg-dark-800 animate-pulse"></div><div class="p-4 space-y-2"><div class="h-4 bg-dark-800 rounded animate-pulse"></div><div class="h-3 bg-dark-800 rounded w-2/3 animate-pulse"></div></div></div>
        <div class="bg-dark-900 rounded-xl overflow-hidden"><div class="aspect-[3/4] bg-dark-800 animate-pulse"></div><div class="p-4 space-y-2"><div class="h-4 bg-dark-800 rounded animate-pulse"></div><div class="h-3 bg-dark-800 rounded w-2/3 animate-pulse"></div></div></div>
        <div class="bg-dark-900 rounded-xl overflow-hidden"><div class="aspect-[3/4] bg-dark-800 animate-pulse"></div><div class="p-4 space-y-2"><div class="h-4 bg-dark-800 rounded animate-pulse"></div><div class="h-3 bg-dark-800 rounded w-2/3 animate-pulse"></div></div></div>
      </div>
      
      <!-- 演出列表 -->
      <div id="eventList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 hidden"></div>
      
      <!-- 错误状态 -->
      <div id="error" class="py-20 text-center hidden">
        <svg class="w-16 h-16 mx-auto text-dark-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <p class="text-dark-400">加载失败，请稍后重试</p>
        <button onclick="loadEvents()" class="mt-4 px-4 py-2 bg-dark-800 rounded-lg text-dark-300 hover:text-white transition-colors">重试</button>
      </div>
    </div>
  </section>

  <!-- 分类入口 -->
  <section class="py-12 border-t border-dark-800">
    <div class="container mx-auto px-4">
      <h2 class="text-2xl font-bold mb-6">演出分类</h2>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <a href="/events/?type=concert" class="bg-dark-900 rounded-xl p-6 border border-transparent hover:border-primary-500 transition-all group">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-lg bg-pink-500/20 flex items-center justify-center">
              <svg class="w-6 h-6 text-pink-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.06 7.44-7 7.93V19h4v2H8v-2h4v-3.07z"/></svg>
            </div>
            <div>
              <h3 class="font-medium group-hover:text-primary-400 transition-colors">演唱会</h3>
              <p class="text-dark-500 text-sm">大型演唱会、巡演</p>
            </div>
          </div>
        </a>
        <a href="/events/?type=livehouse" class="bg-dark-900 rounded-xl p-6 border border-transparent hover:border-primary-500 transition-all group">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-lg bg-purple-500/20 flex items-center justify-center">
              <svg class="w-6 h-6 text-purple-400" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </div>
            <div>
              <h3 class="font-medium group-hover:text-primary-400 transition-colors">Livehouse</h3>
              <p class="text-dark-500 text-sm">小型现场演出</p>
            </div>
          </div>
        </a>
        <a href="/events/?type=festival" class="bg-dark-900 rounded-xl p-6 border border-transparent hover:border-primary-500 transition-all group">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-lg bg-orange-500/20 flex items-center justify-center">
              <svg class="w-6 h-6 text-orange-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h1v3h4v-3h1c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/></svg>
            </div>
            <div>
              <h3 class="font-medium group-hover:text-primary-400 transition-colors">音乐节</h3>
              <p class="text-dark-500 text-sm">户外音乐节</p>
            </div>
          </div>
        </a>
      </div>
    </div>
  </section>

  <!-- 底部 -->
  <footer class="bg-dark-900 border-t border-dark-800 py-8">
    <div class="container mx-auto px-4 text-center">
      <p class="text-dark-600 text-sm">© 2024 看了没 - 发现你喜欢的演出</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
      loadEvents();
      
      // 城市选择器
      document.querySelectorAll('.city-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.city-btn').forEach(b => {
            b.classList.remove('bg-primary-600', 'text-white');
            b.classList.add('bg-dark-800', 'text-dark-300');
          });
          this.classList.remove('bg-dark-800', 'text-dark-300');
          this.classList.add('bg-primary-600', 'text-white');
          loadEvents(this.dataset.city);
        });
      });
    });
  </script>
</body>
</html>
